final_time = 17356680000        # Final simulation time in seconds. (550 yrs); If you are using Tandem on Qworx it will be overridden by Qworx
mesh_file = "bp3.msh"           # Mesh file.
lib = "bp3.lua"                 # Lua file containing material&frictional paramters.
scenario = "bp3_d30_reverse"    # Specific scenario defined in the lua library.
mode = "QDGreen"                # Mode of SEAS simulation: [QuasiDynamic/QD | QuasiDynamicDiscreteGreen/QDGreen | FullyDynamic/FD].
type = "elasticity"             # Type of problem: [poisson | elastic/elasticity].
ref_normal = [1, 0]             # Reference normal vector.
boundary_linear = true          # Assert that boundary is a linear function of time (i.e. boundary(x, t) = f(x) t). Default = False.

# Green's function checkpointing
[gf_checkpoint]
prefix = "gf/"    # Path to write or load pre-computed Green's function; If you are using Tandem on Qworx it will be overridden by Qworx

# Time step checkpointing
[ts_checkpoint]
storage_type = "unlimited"      # Store unlimited amount of checkpoints
freq_step = 10000               # Checkpoint every 10000 time steps
freq_cputime = 60               # Checkpoint every 60 minutes in CPU time
freq_physical_time = 315360000  # Checkpoint every 10 yrs in simulation
save_directory = "checkpoint"   # Path to write checkpoints

